name: BTC & XRP Tagesanalyse

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Analyse starten
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ABSENDER:     ${{ secrets.GMAIL_ABSENDER }}
          GMAIL_APP_PASSWORT: ${{ secrets.GMAIL_APP_PASSWORT }}
          EMPFAENGER:         ${{ secrets.EMPFAENGER }}
        run: python analyse_final.py
